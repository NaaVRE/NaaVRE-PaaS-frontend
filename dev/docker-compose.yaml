name: vrepaas-ui

services:

  catalogue-service:
    image: ghcr.io/naavre/naavre-catalogue-service:v0.6.6
    ports:
      - '127.0.0.1:44664:8000'
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - ./catalogue-fixtures.json:/code/app/fixtures.json
    environment:
      DEV_MODE: "true"
      VERIFY_SSL: false
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: admin
      DJANGO_SUPERUSER_EMAIL: example@example.org
      DB_HOST: catalogue-db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres-password
      DB_NAME: postgres
      S3_ENDPOINT_URL: http://localhost:9000
      S3_BUCKET_NAME: dev-bucket
      S3_ACCESS_KEY: fake-s3-access-key
      S3_SECRET_KEY: fake-s3-secret-key
      OIDC_CONFIGURATION_URL: http://keycloak:8080/realms/vre/.well-known/openid-configuration
      CORS_ALLOWED_ORIGIN_REGEXES: http://localhost:3000

  catalogue-db:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: postgres-password

  catalogue-s3:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    network_mode: service:catalogue-service
    env_file:
      - catalogue-s3.env
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  configure-catalogue-s3:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      catalogue-s3:
        condition: service_healthy
    env_file:
      - catalogue-s3.env
    entrypoint: ["bash", "-e"]
    command: "/configure-s3.sh"
    volumes:
      - ./configure-catalogue-s3.sh:/configure-s3.sh

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    ports:
      - '127.0.0.1:38410:8080'
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/realm.json
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    command:
      - start-dev
      - --hostname-strict=false
      - --import-realm
